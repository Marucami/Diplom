{% extends 'base.html' %}
{% load static %}

{% block title %}Транзакции{% endblock %}

{% block content %}
<div class="container my-4" style="font-family: 'Manrope', sans-serif;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 fw-bold" style="color: #0b1a1e;">Транзакции</h1>
        <button class="btn text-white px-4 py-2" style="background-color: #2c8a93; border-radius: 10px;"
            data-bs-toggle="modal" data-bs-target="#addTxModal" onclick="loadModalSelects()">
            Добавить транзакцию +
        </button>
    </div>

    <div class="card border-0 shadow-sm mb-4" style="border-radius: 16px;">
        <div class="card-body p-3">
            <div class="row g-3">
                <div class="col-md-2">
                    <label class="form-label text-muted small fw-semibold">Месяц</label>
                    <input type="month" id="filter-month" class="form-control" style="border-radius: 10px;">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small fw-semibold">Категория</label>
                    <select id="filter-category" class="form-select" style="border-radius: 10px;">
                        <option value="">Все категории</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small fw-semibold">Счет</label>
                    <select id="filter-account" class="form-select" style="border-radius: 10px;">
                        <option value="">Все счета</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small fw-semibold">Поиск по пометке</label>
                    <div class="input-group">
                        <input type="text" id="search-description" class="form-control" placeholder="Поиск по описанию..." style="border-radius: 10px 0 0 10px;">
                        <button class="btn text-white" id="btn-reset-filters" style="background-color: #6c757d; border-radius: 0 10px 10px 0;" title="Сбросить фильтры">
                            &times;
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-muted">
                    <tr>
                        <th class="border-0 px-4">Дата</th>
                        <th class="border-0">Категория</th>
                        <th class="border-0">Счет</th>
                        <th class="border-0">Сумма</th>
                        <th class="border-0 px-4">Пометка</th>
                        <th class="border-0">Действие</th>
                    </tr>
                </thead>
                <tbody id="transactions-tbody">
                    <tr>
                        <td colspan="6" class="text-center py-4 text-muted">Загрузка транзакций...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer bg-white border-0 text-center py-3 d-none" id="load-more-container">
            <button id="btn-load-more" class="btn btn-outline-secondary px-4" style="border-radius: 10px;">
                Показать еще
            </button>
        </div>
    </div>
</div>

<div class="modal fade" id="addTxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" style="color: #0b1a1e;">Новая транзакция</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="add-tx-form">
                <div class="modal-body py-4">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Тип операции</label>
                        <select class="form-select" name="type" id="tx-type-select" required style="border-radius: 10px; height: 45px;">
                            <option value="EX">Расход</option>
                            <option value="IN">Доход</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Сумма</label>
                        <input type="number" step="0.01" class="form-control" name="amount" required style="border-radius: 10px; height: 45px;" placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Счёт списания/зачисления</label>
                        <select class="form-select" name="account_id" id="modal-account-select" required style="border-radius: 10px; height: 45px;">
                            <option value="">Загрузка счетов...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Категория</label>
                        <select class="form-select" name="category_id" id="modal-category-select" required style="border-radius: 10px; height: 45px;">
                            <option value="">Загрузка категорий...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Дата</label>
                        <input type="date" class="form-control" name="date" id="tx-date" required style="border-radius: 10px; height: 45px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Описание (пометка)</label>
                        <input type="text" class="form-control" name="description" style="border-radius: 10px; height: 45px;" placeholder="Пятерочка, Зарплата и т.д.">
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light px-4 py-2" data-bs-dismiss="modal" style="border-radius: 10px;">Отмена</button>
                    <button type="submit" class="btn text-white px-4 py-2" style="background-color: #2c8a93; border-radius: 10px;">Добавить</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const tbody = document.getElementById('transactions-tbody');
    const loadMoreContainer = document.getElementById('load-more-container');
    const btnLoadMore = document.getElementById('btn-load-more');

    // Состояние пагинации
    let currentPage = 1;
    let hasNextPage = false;

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Упрощенная функция для сессионных запросов
    async function authenticatedFetch(url, options = {}) {
        if (!options.headers) options.headers = {};
        
        // Больше никакого localStorage.getItem('access_token')!
        
        // Для методов изменения данных (POST, PUT, DELETE) строго передаем CSRF-токен
        const method = options.method ? options.method.toUpperCase() : 'GET';
        if (method !== 'GET' && method !== 'HEAD') {
            const csrftoken = getCookie('csrftoken');
            if (csrftoken) {
                options.headers['X-CSRFToken'] = csrftoken;
            }
        }

        let response = await fetch(url, options);

        // Если сессия истекла (401), просто отправляем пользователя на страницу входа
        if (response.status === 401) {
            window.location.href = '/login/';
        }
        
        return response;
    }

    function setDefaultDate() {
        const dateInput = document.getElementById('tx-date');
        if (dateInput) {
            dateInput.value = new Date().toISOString().split('T')[0];
        }
    }
    setDefaultDate();

    // Загрузка транзакций с учетом фильтров и номера страницы
    async function fetchTransactions(append = false) {
        if (!append) {
            currentPage = 1;
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Загрузка транзакций...</td></tr>';
        }

        // Собираем параметры фильтрации
        const month = document.getElementById('filter-month').value;
        const category = document.getElementById('filter-category').value;
        const account = document.getElementById('filter-account').value;
        const search = document.getElementById('search-description').value;

        const params = new URLSearchParams({
            page: currentPage,
            month: month,
            category: category,
            account: account,
            search: search
        });

        try {
            const response = await authenticatedFetch(`/api/transactions/?${params.toString()}`);
            const data = await response.json();

            // Подразумеваем, что бэкенд использует стандартный PageNumberPagination: { results: [], next: ... }
            // Если бэкенд отдает просто массив, пагинация отключится корректно.
            const transactions = data.results !== undefined ? data.results : data;
            hasNextPage = data.next ? true : false;

            if (!append) tbody.innerHTML = '';

            if (transactions.length === 0 && !append) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">Операций пока нет</td></tr>`;
                loadMoreContainer.classList.add('d-none');
                return;
            }

            transactions.forEach(tx => {
                const isExpense = tx.type === 'EX';
                const sign = isExpense ? '-' : '+';
                const textColor = isExpense ? 'text-danger' : 'text-success';
                const formattedDate = new Date(tx.date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

                const categoryName = tx.category_name || (tx.category ? tx.category.name : 'Без категории');
                const accountName = tx.account_name || (tx.account ? tx.account.name : 'Счет');

                const trHtml = `
                    <tr style="border-bottom: 1px solid #f2f4f5;">
                        <td class="px-4 text-secondary">${formattedDate}</td>
                        <td><span class="badge rounded-circle p-1 me-2" style="background-color: #2c8a93; width: 8px; height: 8px; display: inline-block;"></span>${categoryName}</td>
                        <td>${accountName}</td>
                        <td class="fw-bold ${textColor}">${sign} ${Number(tx.amount).toLocaleString('ru-RU')} ₽</td>
                        <td class="px-4 text-muted">${tx.description || '—'}</td>
                        <td><button onclick="deleteTx(${tx.id})" class="btn btn-sm btn-link text-muted py-0" style="text-decoration:none;">&times; Удалить</button></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', trHtml);
            });

            // Управляем видимостью кнопки "Показать еще"
            if (hasNextPage) {
                loadMoreContainer.classList.remove('d-none');
            } else {
                loadMoreContainer.classList.add('d-none');
            }

        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">Ошибка загрузки данных</td></tr>`;
        }
    }

    // Первоначальное наполнение выпадающих фильтров
    async function loadFilterSelects() {
        try {
            const [accRes, catRes] = await Promise.all([
                authenticatedFetch('/api/accounts/'), 
                authenticatedFetch('/api/categories/')
            ]);
            const accounts = await accRes.json();
            const categories = await catRes.json();

            const filterCat = document.getElementById('filter-category');
            filterCat.innerHTML = '<option value="">Все категории</option>' + 
                categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            const filterAcc = document.getElementById('filter-account');
            filterAcc.innerHTML = '<option value="">Все счета</option>' + 
                accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        } catch (e) {
            console.error("Ошибка загрузки списков для фильтрации", e);
        }
    }

    // Динамическая подгрузка в модальное окно добавления
    async function loadModalSelects() {
        try {
            const [accRes, catRes] = await Promise.all([
                authenticatedFetch('/api/accounts/'), 
                authenticatedFetch('/api/categories/')
            ]);
            const accounts = await accRes.json();
            const categories = await catRes.json();

            const accSelect = document.getElementById('modal-account-select');
            accSelect.innerHTML = accounts
                .map(a => `<option value="${a.id}">${a.name} (${Number(a.balance).toLocaleString('ru-RU')} ${a.currency})</option>`)
                .join('');

            const catSelect = document.getElementById('modal-category-select');
            catSelect.innerHTML = categories
                .map(c => `<option value="${c.id}">${c.name}</option>`)
                .join('');
        } catch (e) {
            console.error("Ошибка обновления списков модального окна", e);
        }
    }

    // Слушатели событий для фильтров (мгновенный поиск при изменении)
    document.getElementById('filter-month').addEventListener('change', () => fetchTransactions(false));
    document.getElementById('filter-category').addEventListener('change', () => fetchTransactions(false));
    document.getElementById('filter-account').addEventListener('change', () => fetchTransactions(false));
    
    // Поиск по описанию с небольшой задержкой (Debounce), чтобы не спамить бэкенд на каждую букву
    let searchTimeout;
    document.getElementById('search-description').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            fetchTransactions(false);
        }, 400); 
    });

    // Сброс фильтров
    document.getElementById('btn-reset-filters').addEventListener('click', () => {
        document.getElementById('filter-month').value = '';
        document.getElementById('filter-category').value = '';
        document.getElementById('filter-account').value = '';
        document.getElementById('search-description').value = '';
        fetchTransactions(false);
    });

    // Обработка клика по "Показать еще"
    btnLoadMore.addEventListener('click', () => {
        if (hasNextPage) {
            currentPage++;
            fetchTransactions(true); // true означает "дописать в конец", а не стирать таблицу
        }
    });

    // Отправка формы добавления
    document.getElementById('add-tx-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const formData = new FormData(this);

        const payload = {
            amount: formData.get('amount'),
            type: formData.get('type'),
            account_id: Number(formData.get('account_id')),
            category_id: Number(formData.get('category_id')),
            date: formData.get('date'),
            description: formData.get('description')
        };

        const response = await authenticatedFetch('/api/transactions/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('addTxModal')).hide();
            this.reset();
            setDefaultDate();
            fetchTransactions(false);
        } else {
            alert('Ошибка добавления: ' + JSON.stringify(await response.json()));
        }
    });

    async function deleteTx(id) {
        if (!confirm('Удалить транзакцию? Баланс счетов вернется в исходное состояние.')) return;
        const response = await authenticatedFetch(`/api/transactions/${id}/`, { method: 'DELETE' });
        if (response.ok) fetchTransactions(false);
    }

    // Инициализация страницы
    document.addEventListener('DOMContentLoaded', () => {
        loadFilterSelects();
        fetchTransactions(false);
    });
</script>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %}Транзакции{% endblock %}

{% block content %}
<div class="container my-4" style="font-family: 'Manrope', sans-serif;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0 fw-bold" style="color: #0b1a1e;">Транзакции</h1>
        <button class="btn text-white px-4 py-2" style="background-color: #2c8a93; border-radius: 10px;"
            data-bs-toggle="modal" data-bs-target="#addTxModal" onclick="loadModalSelects()">
            Добавить транзакцию +
        </button>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light text-muted">
                    <tr>
                        <th class="border-0 px-4">Дата</th>
                        <th class="border-0">Категория</th>
                        <th class="border-0">Счет</th>
                        <th class="border-0">Сумма</th>
                        <th class="border-0 px-4">Пометка</th>
                        <th class="border-0 text-end">Действие</th>
                    </tr>
                </thead>
                <tbody id="transactions-tbody">
                    <tr>
                        <td colspan="6" class="text-center py-4 text-muted">Загрузка транзакций...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addTxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" style="color: #0b1a1e;">Новая транзакция</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="add-tx-form">
                <div class="modal-body py-4">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Тип операции</label>
                        <select class="form-select" name="type" id="tx-type-select" required
                            style="border-radius: 10px; height: 45px;">
                            <option value="EX">Расход</option>
                            <option value="IN">Доход</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Сумма</label>
                        <input type="number" step="0.01" class="form-control" name="amount" required
                            style="border-radius: 10px; height: 45px;" placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Счёт списания/зачисления</label>
                        <select class="form-select" name="account_id" id="modal-account-select" required
                            style="border-radius: 10px; height: 45px;">
                            <option value="">Загрузка счетов...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Категория</label>
                        <select class="form-select" name="category_id" id="modal-category-select" required
                            style="border-radius: 10px; height: 45px;">
                            <option value="">Загрузка категорий...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Дата</label>
                        <input type="date" class="form-control" name="date" id="tx-date" required
                            style="border-radius: 10px; height: 45px;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">Описание (пометка)</label>
                        <input type="text" class="form-control" name="description"
                            style="border-radius: 10px; height: 45px;" placeholder="Пятерочка, Зарплата и т.д.">
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light px-4 py-2" data-bs-dismiss="modal"
                        style="border-radius: 10px;">Отмена</button>
                    <button type="submit" class="btn text-white px-4 py-2"
                        style="background-color: #2c8a93; border-radius: 10px;">Добавить</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const tbody = document.getElementById('transactions-tbody');

    function setDefaultDate() {
        const dateInput = document.getElementById('tx-date');
        if (dateInput) {
            dateInput.value = new Date().toISOString().split('T')[0];
        }
    }

    // Текущая дата по умолчанию в форму
    setDefaultDate();

    async function fetchTransactions() {
        try {
            const response = await fetch('/api/transactions/');
            const data = await response.json();

            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">Операций пока нет</td></tr>`;
                return;
            }

            data.forEach(tx => {
                // ВАЖНО: у нас типы IN / EX
                const isExpense = tx.type === 'EX';
                const sign = isExpense ? '-' : '+';
                const textColor = isExpense ? 'text-danger' : 'text-success';
                const formattedDate = new Date(tx.date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

                // Безопасная проверка на случай, если бэкенд возвращает вложенный объект или ID
                const categoryName = tx.category_name || (tx.category ? tx.category.name : 'Без категории');
                const accountName = tx.account_name || (tx.account ? tx.account.name : 'Счет');

                const trHtml = `
                    <tr style="border-bottom: 1px solid #f2f4f5;">
                        <td class="px-4 text-secondary">${formattedDate}</td>
                        <td><span class="badge rounded-circle p-1 me-2" style="background-color: #2c8a93; width: 8px; height: 8px; display: inline-block;"></span>${categoryName}</td>
                        <td>${accountName}</td>
                        <td class="fw-bold ${textColor}">${sign} ${Number(tx.amount).toLocaleString('ru-RU')} ₽</td>
                        <td class="px-4 text-muted">${tx.description || '—'}</td>
                        <td><button onclick="deleteTx(${tx.id})" class="btn btn-sm btn-link text-muted py-0">&times; Удалить</button></td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', trHtml);
            });
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4">Ошибка загрузки</td></tr>`;
        }
    }

    // Динамическая подгрузка актуальных аккаунтов и категорий в форму перед ее открытием
    async function loadModalSelects() {
        try {
            const [accRes, catRes] = await Promise.all([fetch('/api/accounts/'), fetch('/api/categories/')]);
            const accounts = await accRes.json();
            const categories = await catRes.json();

            const accSelect = document.getElementById('modal-account-select');
            accSelect.innerHTML = accounts
                .map(a => `<option value="${a.id}">${a.name} (${Number(a.balance).toLocaleString('ru-RU')} ${a.currency})</option>`)
                .join('');

            const catSelect = document.getElementById('modal-category-select');
            catSelect.innerHTML = categories
                .map(c => `<option value="${c.id}">${c.name}</option>`)
                .join('');
        } catch (e) {
            console.error("Ошибка обновления выпадающих списков модального окна", e);
        }
    }

    // Отправка транзакции
    document.getElementById('add-tx-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const formData = new FormData(this);

        const payload = {
            amount: formData.get('amount'),
            type: formData.get('type'), // IN / EX
            account_id: Number(formData.get('account_id')),
            category_id: Number(formData.get('category_id')),
            date: formData.get('date'),
            description: formData.get('description')
        };

        const response = await fetch('/api/transactions/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('addTxModal')).hide();
            this.reset();
            setDefaultDate(); // чтобы дата не стала пустой после reset()
            fetchTransactions();
        } else {
            alert('Ошибка добавления: ' + JSON.stringify(await response.json()));
        }
    });

    async function deleteTx(id) {
        if (!confirm('Удалить транзакцию? Баланс счетов вернется в исходное состояние.')) return;
        await fetch(`/api/transactions/${id}/`, { method: 'DELETE' });
        fetchTransactions();
    }

    document.addEventListener('DOMContentLoaded', fetchTransactions);
</script>
{% endblock %}
